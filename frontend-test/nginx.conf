# Nginx конфигурация для тестового фронтенда
# Получает запросы с полным путём /test/... от основного nginx

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Кэширование статических ассетов
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Запросы к /test/* — SPA роутинг
    # Основной nginx передаёт путь как есть (/test/login -> /test/login)
    # Все SPA-маршруты отдают index.html
    location /test {
        try_files $uri $uri/ /index.html;
    }

    # Корневой fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
