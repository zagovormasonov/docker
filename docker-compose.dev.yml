# Docker Compose для сервера разработки (DEV)

services:
  # PostgreSQL база данных (отдельная для dev)
  postgres-dev:
    image: postgres:15-alpine
    container_name: synergy-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: synergy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-synergy_dev_password_2025}
      POSTGRES_DB: synergy_db_dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - synergy-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synergy -d synergy_db_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (DEV)
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synergy-backend-dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://synergy:${DB_PASSWORD:-synergy_dev_password_2025}@postgres-dev:5432/synergy_db_dev
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-key-12345}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL_DEV:-http://dev.localhost}
      EMAILJS_SERVICE_ID: ${EMAILJS_SERVICE_ID}
      EMAILJS_PUBLIC_KEY: ${EMAILJS_PUBLIC_KEY}
      EMAILJS_MODERATION_TEMPLATE_ID: ${EMAILJS_MODERATION_TEMPLATE_ID}
      # Юкасса настройки (можно использовать тестовые)
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID_DEV:-${YOOKASSA_SHOP_ID}}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY_DEV:-${YOOKASSA_SECRET_KEY}}
      # Telegram Bot (отдельный для dev или тот же)
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - uploads_data_dev:/app/uploads
    depends_on:
      postgres-dev:
        condition: service_healthy
    networks:
      - synergy-network-dev
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/topics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Frontend (Nginx с Basic Auth)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_EMAILJS_SERVICE_ID=${VITE_EMAILJS_SERVICE_ID}
        - VITE_EMAILJS_PUBLIC_KEY=${VITE_EMAILJS_PUBLIC_KEY}
        - VITE_EMAILJS_VERIFICATION_TEMPLATE_ID=${VITE_EMAILJS_VERIFICATION_TEMPLATE_ID}
        - VITE_EMAILJS_RESET_PASSWORD_TEMPLATE_ID=${VITE_EMAILJS_RESET_PASSWORD_TEMPLATE_ID}
        - VITE_EMAILJS_MODERATION_TEMPLATE_ID=${VITE_EMAILJS_MODERATION_TEMPLATE_ID}
    container_name: synergy-frontend-dev
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - backend-dev
    networks:
      - synergy-network-dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  synergy-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
  uploads_data_dev:
